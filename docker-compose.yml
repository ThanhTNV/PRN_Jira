version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: prn_jira_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: prn_jira_db
      MYSQL_USER: prn_user
      MYSQL_PASSWORD: prn1234
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot1234"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
